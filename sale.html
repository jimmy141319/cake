<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuStar 手工堅果塔</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
      background:#f8f6f2;
      color:#2d2a26;
    }
    .container{
      max-width:480px;
      margin:auto;
      padding:16px;
    }
    img{
      width:100%;
      border-radius:16px;
      display:block;
    }
    h1{
      font-size:26px;
      line-height:1.35;
      margin:16px 0 12px;
    }
    .section{
      margin-top:24px;
      line-height:1.75;
      font-size:16px;
    }
    .price{
      font-size:30px;
      font-weight:700;
      margin:18px 0 8px;
    }
    .highlight{
      color:#e60000;
      font-weight:800;
      font-size:18px;
    }
    .button{
      display:block;
      text-align:center;
      background:#ff6a00;
      color:#fff;
      padding:16px;
      border-radius:999px;
      text-decoration:none;
      font-size:18px;
      font-weight:700;
      margin:22px 0;
    }
    .checklist{
      margin-top:24px;
      font-size:16px;
      line-height:1.9;
    }
    .checklist div{
      margin-bottom:4px;
    }
    .notice{
      color:#e60000;
      font-weight:800;
      font-size:18px;
      margin-top:26px;
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="mustar_box.jpg.PNG" alt="MuStar 8入禮盒" />

    <h1>🔥 今日現做｜限量販售<br>MuStar 手工堅果塔</h1>

    <div class="section">
      純天然堅果｜無添加<br>
      每天新鮮製作，通常下午售完
    </div>

    <div class="price">8入 NT$199</div>
    <div class="highlight">（今日剩少量）</div>

    <a href="#" class="button">👉 立即下單（剩少量）</a>

    <div class="section">
      <img src="mustar_single.jpg.PNG" alt="MuStar 單顆包裝" />
    </div>

    <div class="checklist">
      <div>✔ 使用整顆堅果</div>
      <div>✔ 無防腐劑</div>
      <div>✔ 手工製作，每批有限</div>
    </div>

    <div class="notice">今日製作數量有限，售完即止</div>

    <a href="#" class="button">👉 立即下單</a>

  </div>
</body>
</html>
