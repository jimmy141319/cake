<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  />
  <title>MuStar 手工堅果塔</title>

  <style>
    :root {
      --bg: #fffaf5;
      --text: #2d2d2d;
      --muted: #6f6f6f;
      --primary: #ff6a00;
      --primary-dark: #e55d00;
      --soft: #fff1e8;
      --soft-2: #f7f7f7;
      --danger: #ff3b30;
      --line: #e9e9e9;
      --card-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --max: 860px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: #ffffff;
      text-align: center;
      overflow-x: hidden;
      padding-bottom: 100px;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .wrap {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
    }

    /* -------------------------
       Animations
    ------------------------- */
    @keyframes heroBreath {
      0% {
        transform: scale(1) translateY(0);
      }
      50% {
        transform: scale(1.06) translateY(-6px);
      }
      100% {
        transform: scale(1) translateY(0);
      }
    }

    @keyframes oceanSlide {
      0% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(-120px);
      }
      100% {
        transform: translateX(0);
      }
    }

    @keyframes oceanRise {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @keyframes nutFloat {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-16px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @keyframes lightSweep {
      0% {
        opacity: 0.18;
        transform: translateX(-80px);
      }
      50% {
        opacity: 0.55;
        transform: translateX(70px);
      }
      100% {
        opacity: 0.18;
        transform: translateX(-80px);
      }
    }

    @keyframes floatText {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @keyframes pulseBtn {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.045);
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* -------------------------
       Hero
    ------------------------- */
    .hero {
      position: relative;
      width: 100%;
      height: 72vh;
      min-height: 420px;
      max-height: 760px;
      overflow: hidden;
      background: #dce8ef;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: heroBreath 10s ease-in-out infinite;
      transform-origin: center center;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: -12%;
      width: 124%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.22),
        transparent
      );
      pointer-events: none;
      animation: lightSweep 5s linear infinite;
      z-index: 2;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -12%;
      bottom: 0;
      width: 124%;
      height: 42%;
      background: linear-gradient(
        to top,
        rgba(255, 255, 255, 0.22),
        rgba(255, 255, 255, 0.08),
        rgba(255, 255, 255, 0)
      );
      pointer-events: none;
      animation:
        oceanSlide 6s ease-in-out infinite,
        oceanRise 4s ease-in-out infinite,
        nutFloat 5s ease-in-out infinite;
      z-index: 2;
    }

    /* -------------------------
       Main content
    ------------------------- */
    .section {
      padding: 22px 18px;
      animation: fadeUp 0.7s ease both;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      box-shadow: var(--card-shadow);
      padding: 22px 18px;
      margin: 0 auto 18px;
    }

    .price {
      font-size: clamp(30px, 6vw, 40px);
      font-weight: 900;
      margin: 8px 0 6px;
      letter-spacing: -0.5px;
      animation: floatText 3.2s ease-in-out infinite;
    }

    .alert {
      display: inline-block;
      margin-top: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff2f1;
      color: var(--danger);
      font-weight: 800;
      font-size: 15px;
      animation: floatText 2.4s ease-in-out infinite;
    }

    .desc {
      margin: 16px auto 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
      max-width: 620px;
    }

    .selling-points {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 22px auto 8px;
      max-width: 680px;
    }

    .point {
      background: var(--soft);
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 700;
      color: #74411c;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 520px;
      margin: 14px auto 0;
      border: none;
      border-radius: 18px;
      padding: 18px 20px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 12px 24px rgba(255, 106, 0, 0.22);
      animation: pulseBtn 1.8s ease-in-out infinite;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--soft-2);
      color: #333;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .mini-note {
      margin-top: 12px;
      color: #999;
      font-size: 13px;
      line-height: 1.6;
    }

    /* -------------------------
       Trust
    ------------------------- */
    .trust-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }

    .trust-badge {
      background: #fff;
      border: 1px solid #f0e5db;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #6a4a2d;
    }

    .sold-box {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 900;
      color: #222;
    }

    .review-box {
      margin-top: 20px;
      background: #fafafa;
      border: 1px solid #efefef;
      border-radius: 18px;
      padding: 18px 16px;
      line-height: 1.8;
      color: #555;
      text-align: left;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .review-title {
      font-weight: 900;
      color: #222;
      margin-bottom: 8px;
      text-align: center;
    }

    .review-item {
      padding: 6px 0;
      border-bottom: 1px dashed #ececec;
    }

    .review-item:last-child {
      border-bottom: 0;
    }

    .real-box {
      margin-top: 20px;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .real-title {
      font-weight: 900;
      margin-bottom: 10px;
      font-size: 18px;
      color: #222;
    }

    .real-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .real-grid img {
      border-radius: 16px;
      width: 100%;
      height: 210px;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .trust-info {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      line-height: 1.8;
    }

    /* -------------------------
       Fixed CTA
    ------------------------- */
    .fixed-bar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      z-index: 999;
    }

    .fixed-btn {
      display: block;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border-radius: 16px;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      padding: 16px 18px;
      box-shadow: 0 10px 20px rgba(255, 106, 0, 0.2);
      animation: pulseBtn 1.8s ease-in-out infinite;
    }

    /* -------------------------
       Responsive
    ------------------------- */
    @media (max-width: 720px) {
      .hero {
        height: 68vh;
        min-height: 360px;
      }

      .selling-points {
        grid-template-columns: 1fr;
      }

      .real-grid {
        grid-template-columns: 1fr;
      }

      .real-grid img {
        height: 220px;
      }

      .btn {
        font-size: 18px;
      }
    }
  </style>
</head>
